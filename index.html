<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/web_project_around_auth/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tripleten Project Around</title>
    <script>
      // GitHub Pages SPA fix: if we came from 404.html with ?p=..., restore the route.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p");
        if (p) {
          params.delete("p");
          var clean = params.toString();
          var newUrl =
            window.location.pathname.replace(/\\/?$/, "/") +
            p.replace(/^\\//, "") +
            (clean ? "?" + clean : "") +
            window.location.hash;
          window.history.replaceState(null, "", newUrl);
        }
      })();
    </script>
